<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karatech ELV · Videos</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0d0e12;color:#eef0f4;font-family:Tahoma,sans-serif;padding:40px 20px}
        .container{max-width:1100px;margin:0 auto}
        .header{display:flex;justify-content:space-between;align-items:center;padding:16px 30px;background:#1e2128;border-radius:16px;margin-bottom:30px;flex-wrap:wrap;gap:10px}
        .brand{font-weight:700;font-size:1.5rem;color:#fff}
        .brand span{color:#d4af37}
        .lang-btn{background:transparent;border:1px solid #333;color:#8e95a5;padding:5px 14px;border-radius:30px;cursor:pointer;font-size:.8rem;transition:.2s}
        .lang-btn.active{background:#5b3b8c;border-color:#d4af37;color:#fff}
        .lang-btn:hover{background:#5b3b8c;color:#fff}
        .lang-switch{display:flex;gap:6px}
        h1{color:#d4af37;font-size:2.2rem;margin-bottom:10px}
        .sub{color:#8e95a5;font-size:1rem;line-height:1.8;margin-bottom:25px}
        .video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:30px}
        .video-card{background:#1e2128;border-radius:16px;overflow:hidden;border:1px solid rgba(212,175,55,0.08);transition:.3s}
        .video-card:hover{transform:translateY(-4px);border-color:#d4af37}
        .video-card video{width:100%;height:auto;display:block;max-height:200px;object-fit:cover;background:#000}
        .video-info{padding:12px 16px}
        .video-info h3{color:#fff;font-size:0.95rem;margin-bottom:4px}
        .video-info p{color:#8e95a5;font-size:.8rem}
        .back{text-align:center;margin-top:30px}
        .back a{color:#d4af37;text-decoration:none;font-weight:600;cursor:pointer}
        .back a:hover{text-decoration:underline}
        .lang-persian{direction:rtl}
        .lang-persian .header{flex-direction:row-reverse}
        @media(max-width:768px){h1{font-size:1.8rem}.video-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="brand">KARATECH <span>ELV</span></div>
        <div class="lang-switch">
            <button class="lang-btn active" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="fa">FA</button>
        </div>
    </div>

    <h1 id="title">🎬 Videos</h1>
    <div class="sub" id="desc">Video tutorials for automation engineering.</div>

    <div class="video-grid" id="videoGrid"></div>

    <div class="back">
        <a href="javascript:history.back()" id="backlink">← Back</a>
    </div>

</div>

<script>
    const videoList = [
        { id: 1, file: 'VID_1.mp4', titleEn: 'Video 1', titleFa: 'ویدئو ۱', descEn: 'Tutorial video 1', descFa: 'ویدئو آموزشی ۱' }
    ];

    let currentLang = localStorage.getItem('karatech-lang') || 'en';

  function renderVideos(lang) {
    const grid = document.getElementById('videoGrid');
    grid.innerHTML = '';
    videoList.forEach(v => {
        const card = document.createElement('div');
        card.className = 'video-card';

        const video = document.createElement('video');
        video.controls = true;
        video.style.width = '100%';
        video.style.height = 'auto';
        video.style.maxHeight = '200px';
        video.style.objectFit = 'cover';
        video.style.background = '#000';

        const source = document.createElement('source');
        const videoPath = `_assets/videos/${v.file}`;
        source.src = videoPath;
        source.type = 'video/mp4';
        video.appendChild(source);

        video.innerHTML = 'Your browser does not support the video tag.';

        const info = document.createElement('div');
        info.className = 'video-info';

        const title = document.createElement('h3');
        title.textContent = lang === 'fa' ? v.titleFa : v.titleEn;

        const desc = document.createElement('p');
        desc.textContent = lang === 'fa' ? v.descFa : v.descEn;

        info.appendChild(title);
        info.appendChild(desc);
        card.appendChild(video);
        card.appendChild(info);
        grid.appendChild(card);
    });
}
    function setLang(l) {
        currentLang = l;
        renderVideos(l);
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
        document.body.classList.toggle('lang-persian', l === 'fa');
        localStorage.setItem('karatech-lang', l);
        
        const titles = {
            en: { title: '🎬 Videos', desc: 'Video tutorials for automation engineering.', back: '← Back' },
            fa: { title: '🎬 ویدئوها', desc: 'آموزش‌های ویدئویی برای مهندسی اتوماسیون.', back: '← بازگشت' }
        };
        document.getElementById('title').textContent = titles[l].title;
        document.getElementById('desc').textContent = titles[l].desc;
        document.getElementById('backlink').textContent = titles[l].back;
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.onclick = function() { setLang(this.dataset.lang); };
    });

    const savedLang = localStorage.getItem('karatech-lang') || 'en';
    setLang(savedLang);
</script>

</body>
</html>
