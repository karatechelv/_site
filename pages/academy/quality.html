<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Karatech ELV · Quality Control</title>
    <link rel="stylesheet" href="../../style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body.page-quality .dashboard {
            background: 
                linear-gradient(rgba(13,14,18,0.80), rgba(13,14,18,0.88)),
                url('https://images.unsplash.com/photo-1581092335872-4f5b7b8c8c9f?w=1600&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        body.page-quality .card-academy {
            backdrop-filter: blur(6px);
            background: rgba(26, 29, 36, 0.85);
            border: 1px solid rgba(212, 175, 55, 0.08);
        }
        body.page-quality .card-academy:hover {
            background: rgba(37, 42, 52, 0.92);
            border-color: var(--accent);
        }
    </style>
</head>
<body class="page-quality">
    <h1 style="text-align:center; margin-top:50px; font-size:2rem; color:var(--accent);">
        <i class="fas fa-check-double"></i> Quality Control
    </h1>
    <p style="text-align:center; color:var(--muted); margin-top:10px;">
        Inspection, testing, ISO standards, and continuous improvement.
    </p>
    <div style="text-align:center; margin-top:30px;">
        <a href="../../index.html" style="color:var(--accent); text-decoration:none;">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
    </div>
</body>
</html>
