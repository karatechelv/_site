<!DOCTYPE html>
<html>
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Karatech ELV · Unit Converter</title>
 <style>
 *{margin:0;padding:0;box-sizing:border-box}
 body{background:#0d0e12;color:#eef0f4;font-family:Tahoma,sans-serif;padding:40px 20px}
 .container{max-width:900px;margin:0 auto}
 .header{display:flex;justify-content:space-between;align-items:center;padding:16px 30px;background:#1e2128;border-radius:16px;margin-bottom:30px;flex-wrap:wrap;gap:10px}
 .brand{font-weight:700;font-size:1.5rem;color:#fff}
 .brand span{color:#d4af37}
 .lang-btn{background:transparent;border:1px solid #333;color:#8e95a5;padding:5px 14px;border-radius:30px;cursor:pointer;font-size:.8rem;transition:.2s}
 .lang-btn.active{background:#5b3b8c;border-color:#d4af37;color:#fff}
 .lang-btn:hover{background:#5b3b8c;color:#fff}
 .lang-switch{display:flex;gap:6px}
 h1{color:#d4af37;font-size:2.2rem;margin-bottom:10px}
 .sub{color:#8e95a5;font-size:1rem;line-height:1.8;margin-bottom:25px}
 .section{background:#1e2128;padding:20px;border-radius:12px;margin-bottom:15px;border:1px solid rgba(212,175,55,0.08)}
 .section h2{color:#d4af37;font-size:1.3rem;margin-bottom:10px}
 .section p{color:#b0b8c5;line-height:1.8;margin-bottom:10px}
 .calc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
 .calc-grid label{color:#b0b8c5;font-size:.9rem;display:flex;flex-direction:column;gap:4px}
 .calc-grid input,.calc-grid select{background:#0d0e12;border:1px solid #2a2f3a;color:#eef0f4;padding:8px 12px;border-radius:8px;font-size:.95rem;width:100%}
 .calc-grid input:focus,.calc-grid select:focus{outline:1px solid #d4af37}
 .result-box{background:#0d0e12;padding:16px;border-radius:12px;border-left:3px solid #d4af37;font-size:1.2rem;font-weight:600;color:#d4af37;margin-top:12px;text-align:center}
 .calc-btn{background:#5b3b8c;border:1px solid #d4af37;color:#fff;padding:12px 30px;border-radius:30px;font-weight:600;cursor:pointer;transition:.2s;margin-top:10px}
 .calc-btn:hover{background:#d4af37;color:#111}
 .back{text-align:center;margin-top:30px}
 .back a{color:#d4af37;text-decoration:none;font-weight:600;cursor:pointer}
 .back a:hover{text-decoration:underline}
 .lang-persian{direction:rtl}
 .lang-persian .header{flex-direction:row-reverse}
 @media(max-width:768px){h1{font-size:1.8rem}.header{flex-direction:column;align-items:stretch}.calc-grid{grid-template-columns:1fr}}
 </style>
</head>
<body>
<div class="container">
 <div class="header">
  <div class="brand">KARATECH <span>ELV</span></div>
  <div class="lang-switch">
   <button class="lang-btn active" data-lang="en">EN</button>
   <button class="lang-btn" data-lang="fa">FA</button>
  </div>
 </div>
 <h1 id="title">Unit Converter</h1>
 <div class="sub" id="desc">Convert engineering units: length, mass, temperature, pressure, and power.</div>

 <div class="section">
  <h2 id="calc-title">Converter</h2>
  <div class="calc-grid">
   <label>Category <select id="category" onchange="updateUnits()">
    <option value="length">Length</option>
    <option value="mass">Mass</option>
    <option value="temperature">Temperature</option>
    <option value="pressure">Pressure</option>
    <option value="power">Power</option>
   </select></label>
   <label>From <select id="fromUnit"></select></label>
   <label>To <select id="toUnit"></select></label>
   <label>Value <input type="number" id="value" value="1" step="0.001"></label>
  </div>
  <button class="calc-btn" id="calcBtn" onclick="convertUnit()">Convert</button>
  <div class="result-box" id="result">Result: 0.00</div>
 </div>

 <div class="back">
  <a href="javascript:history.back()" id="backlink">← Back</a>
 </div>
</div>
<script>
const units = {
 length: { m:1, km:1000, cm:0.01, mm:0.001, ft:0.3048, in:0.0254, yd:0.9144, mi:1609.34 },
 mass: { kg:1, g:0.001, mg:0.000001, lb:0.453592, oz:0.0283495, ton:1000 },
 temperature: { C:1, F:1.8, K:1 },
 pressure: { Pa:1, kPa:1000, MPa:1000000, bar:100000, psi:6894.76, atm:101325 },
 power: { W:1, kW:1000, MW:1000000, HP:745.7 }
};
const unitLabels = {
 length: ['m','km','cm','mm','ft','in','yd','mi'],
 mass: ['kg','g','mg','lb','oz','ton'],
 temperature: ['°C','°F','K'],
 pressure: ['Pa','kPa','MPa','bar','psi','atm'],
 power: ['W','kW','MW','HP']
};
function updateUnits() {
 const cat = document.getElementById('category').value;
 const from = document.getElementById('fromUnit');
 const to = document.getElementById('toUnit');
 const labels = unitLabels[cat];
 from.innerHTML = labels.map(u => `<option value="${u}">${u}</option>`).join('');
 to.innerHTML = labels.map(u => `<option value="${u}">${u}</option>`).join('');
}
function convertUnit() {
 const cat = document.getElementById('category').value;
 const from = document.getElementById('fromUnit').value;
 const to = document.getElementById('toUnit').value;
 const val = parseFloat(document.getElementById('value').value) || 0;
 if (cat === 'temperature') {
  let result = 0;
  if (from === '°C' && to === '°F') result = val * 9/5 + 32;
  else if (from === '°F' && to === '°C') result = (val - 32) * 5/9;
  else if (from === '°C' && to === 'K') result = val + 273.15;
  else if (from === 'K' && to === '°C') result = val - 273.15;
  else if (from === '°F' && to === 'K') result = (val - 32) * 5/9 + 273.15;
  else if (from === 'K' && to === '°F') result = (val - 273.15) * 9/5 + 32;
  else result = val;
  document.getElementById('result').textContent = 'Result: ' + result.toFixed(2) + ' ' + to;
  return;
 }
 const factor = units[cat][to] / units[cat][from];
 document.getElementById('result').textContent = 'Result: ' + (val * factor).toFixed(4) + ' ' + to;
}
updateUnits();
const lang = {
 en: {
  title: 'Unit Converter',
  desc: 'Convert engineering units: length, mass, temperature, pressure, and power.',
  back: '← Back'
 },
 fa: {
  title: 'مبدل واحدهای مهندسی',
  desc: 'تبدیل واحدهای مهندسی: طول، جرم، دما، فشار و توان.',
  back: '← بازگشت'
 }
};
function setLang(l) {
 const t = lang[l]; if (!t) return;
 document.getElementById('title').textContent = t.title;
 document.getElementById('desc').textContent = t.desc;
 document.getElementById('backlink').textContent = t.back;
 document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
 document.body.classList.toggle('lang-persian', l === 'fa');
 localStorage.setItem('karatech-lang', l);
}
document.querySelectorAll('.lang-btn').forEach(btn => { btn.onclick = function() { setLang(this.dataset.lang); }; });
const savedLang = localStorage.getItem('karatech-lang') || 'en';
setLang(savedLang);
</script>
</body>
</html>
